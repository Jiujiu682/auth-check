<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>卡密管理</title>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
.wrap{display:flex;min-height:100vh}
.sidebar{width:170px;background:#222838;padding-top:25px}
.menu{padding:12px 20px;color:#e2e8f0;cursor:pointer}
.menu:hover{background:#333a4e}
.main{flex:1;padding:20px;background:#f5f7fa}
.search-bar{background:#fff;padding:15px;border-radius:5px;margin-bottom:15px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
input,select{padding:6px 8px;border:1px solid #ccc;border-radius:3px}
.btns button{padding:6px 12px;border-radius:3px;margin-right:6px;cursor:pointer;border:1px solid #ccc;background:#fff}
.btns .ban{color:#f39c12;border-color:#f39c12}
.btns .unban{color:#27ae60;border-color:#27ae60}
.btns .del{color:#e74c3c;border-color:#e74c3c}
table{width:100%;border-collapse:collapse;background:#fff}
td,th{border:1px solid #ddd;padding:8px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="sidebar">
    <div class="menu">卡密查询</div>
    <div class="menu">许可证生成</div>
  </div>
  <div class="main">
    <div class="search-bar">
      <div class="row">
        <input id="keyCode" placeholder="卡密关键词">
        <select id="useStatus">
          <option value="">全部使用状态</option>
          <option value="未使用">未使用</option>
          <option value="已使用">已使用</option>
        </select>
        <select id="banStatus">
          <option value="">全部封禁状态</option>
          <option value="正常">正常</option>
          <option value="封禁">封禁</option>
        </select>
        <input type="date" id="startDay">
        <input type="date" id="endDay">
        <button id="searchBtn">搜索</button>
        <button id="resetBtn">重置</button>
      </div>
      <div class="btns">
        <button class="ban" id="banBtn">批量封禁</button>
        <button class="unban" id="unBanBtn">批量解禁</button>
        <button class="del" id="delBtn">批量删除</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" id="allCheck"></th>
          <th>卡密</th>
          <th>类型</th>
          <th>使用状态</th>
          <th>封禁状态</th>
          <th>有效天数</th>
          <th>生成时间</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const SECRET_KEY = "abc1234567890key";
function aesEncrypt(data){return CryptoJS.AES.encrypt(JSON.stringify(data),SECRET_KEY).toString()}
function aesDecrypt(str){return JSON.parse(CryptoJS.AES.decrypt(str,SECRET_KEY).toString(CryptoJS.enc.Utf8))}
let selectArr=[];
const allCheck=document.getElementById('allCheck');
const tableBody=document.getElementById('tableBody');
const searchBtn=document.getElementById('searchBtn');
const resetBtn=document.getElementById('resetBtn');
const banBtn=document.getElementById('banBtn');
const unBanBtn=document.getElementById('unBanBtn');
const delBtn=document.getElementById('delBtn');
const menu=document.querySelectorAll('.menu');

async function apiPost(url,data){
  const res=await fetch(`/api/${url}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({payload:aesEncrypt(data)})
  })
  const json=await res.json();
  return aesDecrypt(json.payload);
}

function loadList(){
  selectArr=[];
  const param={
    key:document.getElementById('keyCode').value,
    use:document.getElementById('useStatus').value,
    ban:document.getElementById('banStatus').value,
    s:document.getElementById('startDay').value,
    e:document.getElementById('endDay').value
  }
  apiPost('check',param).then(list=>{
    tableBody.innerHTML='';
    list.forEach(item=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
      <td><input class="ck" value="${item.code}" type="checkbox"></td>
      <td>${item.code}</td>
      <td>${item.type}</td>
      <td>${item.useTime}</td>
      <td>${item.ban}</td>
      <td>${item.day}</td>
      <td>${item.create}</td>
      `
      tableBody.appendChild(tr);
    })
    document.querySelectorAll('.ck').forEach(cb=>{
      cb.onchange=()=>{
        if(cb.checked)selectArr.push(cb.value)
        else selectArr=selectArr.filter(v=>v!==cb.value)
      }
    })
  })
}

allCheck.onchange=()=>{
  document.querySelectorAll('.ck').forEach(c=>c.checked=allCheck.checked);
  if(allCheck.checked){
    selectArr=[];
    document.querySelectorAll('.ck').forEach(c=>selectArr.push(c.value))
  }else selectArr=[];
}
searchBtn.onclick=loadList;
resetBtn.onclick=()=>{
  document.querySelectorAll('input,select').forEach(i=>i.value='');
  tableBody.innerHTML='';selectArr=[];allCheck.checked=false;
}
banBtn.onclick=async()=>{
  if(!selectArr.length)return alert('勾选卡密');
  await apiPost('ban',{keys:selectArr});alert('封禁成功');loadList();
}
unBanBtn.onclick=async()=>{
  if(!selectArr.length)return alert('勾选卡密');
  await apiPost('unban',{keys:selectArr});alert('解禁成功');loadList();
}
delBtn.onclick=async()=>{
  if(!selectArr.length||!confirm('确认删除？'))return;
  await apiPost('del',{keys:selectArr});alert('已删除');loadList();
}
menu[1].onclick=async()=>{
  const num=prompt('生成数量');
  const type=prompt('卡类型：天卡/月卡');
  const day=prompt('有效天数');
  if(!num||!type||!day)return;
  const ret=await apiPost('create',{num:Number(num),type,day:Number(day)});
  alert(ret.msg);loadList();
}
</script>
</body>
</html>
