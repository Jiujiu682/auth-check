<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>卡密管理后台</title>
</head>
<body style="padding:30px;">
    <div>
        <h3>1.生成新卡密</h3>
        <input id="createDay" placeholder="可用天数" value="1">
        <button onclick="createKey()">生成</button>
        <div>新卡密：<span id="newKey"></span></div>
    </div>
    <div style="margin-top:20px;">
        <h3>2.已激活卡密续时(填明文卡密)</h3>
        <input id="editKey" placeholder="原始卡密">
        <input id="addNum" placeholder="增加天数" value="1">
        <button onclick="addTime()">确认加时</button>
    </div>
    <div style="margin-top:20px;">
        <h3>3.库存未激活卡密列表</h3>
        <div id="poolList"></div>
    </div>
    <div style="margin-top:20px;">
        <h3>4.已激活用户列表</h3>
        <div id="activeList"></div>
    </div>

<script>
//接口固定地址
const api = "/api/admin"
//刷新列表
async function load(){
    let d = await fetch(api).then(r=>r.json())
    //渲染库存
    let poolHtml=''
    d.pool.forEach(([k,day])=>{
        poolHtml += `<div>${k} | ${day}天 <button onclick="ban('${k}')">封禁</button></div>`
    })
    poolList.innerHTML = poolHtml
    //渲染激活
    let actHtml=''
    d.active.forEach(item=>{
        actHtml += `<div>密文：${item.hash} | 到期：${new Date(item.end).toLocaleString()} ${item.isBan?'【封禁】':''}</div>`
    })
    activeList.innerHTML=actHtml
}
//生成卡密
async function createKey(){
    let day = createDay.value
    let res=await fetch(api,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'create',day})})
    let data=await res.json()
    newKey.innerText=data.code
    load()
}
//加时长
async function addTime(){
    await fetch(api,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'addTime',key:editKey.value,newDay:addNum.value})})
    load()
}
//封禁
async function ban(k){
    await fetch(api,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'ban',key:k})})
    load()
}
window.onload=load
</script>
</body>
</html>
